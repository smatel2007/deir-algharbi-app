name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.3'
        channel: 'stable'
        cache: true

    - name: Enable Android
      run: flutter config --enable-android

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flet supabase

    - name: Initialize Flet Project Structure
      run: |
        # هذا الأمر يقوم بتهيئة ملفات الـ Flutter الخاصة بـ Flet لمرة واحدة صامتة بدون أخطاء
        flet pack main.py --dry-run || true

    - name: Build APK directly via Flutter
      run: |
        # الانتقال لمجلد البناء الداخلي لفلاتر وبناء الـ APK مباشرة لتجنب تكرار الـ doctor
        if [ -d "build" ]; then cd build; fi
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: |
          build/app/outputs/flutter-apk/*.apk
          **/app-release.apk
