name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.3'
        channel: 'stable'
        cache: true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet supabase

    - name: Build Android APK
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        python3 -c "
        import subprocess
        process = subprocess.Popen(['flet', 'build', 'apk'], stdin=subprocess.PIPE, text=True)
        process.communicate(input='y\ny\ny\ny\n')
        "

    - name: Find and List APK files for debugging
      run: |
        echo "Searching for APK files in the workspace:"
        find . -name "*.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: |
          **/*.apk
